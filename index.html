<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haven Pay</title>

  <style>
    body {
      margin: 0;
      background: #d9d2c3;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .panel {
      display: flex;
      gap: 40px;
      background: #e7dfcf;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    .terminal {
      width: 420px;
      height: 300px;
      background: black;
      color: #00ff88;
      padding: 20px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .card {
      width: 260px;
      font-family: serif;
    }

    .rail {
      margin-top: 20px;
      padding: 14px;
      background: #f3ede2;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      background: #bbb;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="panel">

  <div class="terminal" id="readout">
    > INITIALIZING...<br>
  </div>

  <div class="card">
    <h2>Haven Pay</h2>
    <p>Your creative capital rails.</p>

    <div class="rail">
      <span>STRIPE RAIL</span>
      <span class="badge" id="stripe-status">OFFLINE</span>
    </div>
  </div>

</div>

<script>
const BACKEND_URL = "https://haven-pay-production.up.railway.app";
const USER_EMAIL = "colecalfee@gmail.com";

async function syncHaven() {
  try {
    const res = await fetch(`${BACKEND_URL}/api/summary?email=${encodeURIComponent(USER_EMAIL)}`);
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    document.getElementById("readout").innerHTML = `
      > OPERATOR: ${data.name?.toUpperCase() || "UNKNOWN"}<br>
      > SUBSCRIPTION: ${data.subscription_status?.toUpperCase() || "NONE"}<br>
      > OPEN_INVOICES: ${data.open_invoice_count || 0}<br>
      > SYSTEM_READY
    `;

    document.getElementById("stripe-status").textContent = "CONNECTED";
  } catch (err) {
    document.getElementById("readout").innerHTML =
      "> SIGNAL_LOSS: CHECK_BACKEND_CONNECTION";
  }
}

syncHaven();
</script>

</body>
</html>
